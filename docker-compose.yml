services:
  backend:
    build: ./backend
    environment:
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in .env}
      DEBUG: "false"
      ALLOWED_HOSTS: backend,localhost
    volumes:
      - db_data:/app/db.sqlite3
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
